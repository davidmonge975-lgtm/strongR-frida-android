name: strongR-frida-16.7.14

on:
  workflow_dispatch:

# Otorga los permisos necesarios para crear la Release sin dar error
permissions:
  contents: write

jobs:
  android_build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.9'

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief graphlib

    - name: build frida for Android
      shell: bash
      run: |
        # Configuración básica (Sin usar secretos)
        git config --global user.name "davidmonge975-lgtm"
        git config --global user.email "david@github.com"
        
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        
        # Clonar exactamente la versión 16.7.14
        git clone --recurse-submodules --branch 16.7.14 https://github.com/frida/frida
        cd frida
        
        # Aplicar los parches de ocultamiento (hluda) si existen en tu fork
        if [ -d "../Patchs/strongR-frida" ]; then
          for path in ../Patchs/strongR-frida/*
          do
            name=$(basename $path)
            real=$(realpath $path)
            echo "Aplicando parches en $real a frida/subprojects/$name"
            cd subprojects/$name
            git am ../../../Patchs/strongR-frida/$name/*.patch
            cd ../..
          done
        else
          echo "⚠️ ADVERTENCIA: No se encontró la carpeta 'Patchs'. Se compilará Frida estándar."
        fi
        cd ..
        
        # Compilar SOLO para arm64 (Optimizado para tu dispositivo)
        ARCHES="android-arm64"
        for ARCH in $ARCHES
        do
          mkdir build-$ARCH
          cd build-$ARCH
          ../frida/configure --host=$ARCH
          make
          cd ..
        done

    - name: package build result for Android
      shell: bash
      run: |
        gzip build-android-arm64/subprojects/frida-core/server/frida-server
        gzip build-android-arm64/subprojects/frida-core/inject/frida-inject
        gzip build-android-arm64/subprojects/frida-core/lib/gadget/frida-gadget.so
        
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "16.7.14-hluda"
        name: "hluda-server 16.7.14 (arm64)"
        files: |
          build-android-arm64/subprojects/frida-core/server/frida-server.gz
          build-android-arm64/subprojects/frida-core/inject/frida-inject.gz
          build-android-arm64/subprojects/frida-core/lib/gadget/frida-gadget.so.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
